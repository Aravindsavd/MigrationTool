trigger:
  branches:
    include:
      - main

variables:
  ACR_NAME: 'migrationtrackeracr'
  ACR_LOGIN_SERVER: '$(ACR_NAME).azurecr.io'
  IMAGE_NAME: 'migration-tracker'
  CONTAINER_APP_NAME: 'migration-tracker'
  RESOURCE_GROUP: 'migration-tracker-rg'
  LOCATION: 'eastus'
  SERVICE_CONNECTION: 'azure-service-connection'

stages:

  # ─────────────────────────────────────────
  # STAGE 1: BUILD & TEST
  # ─────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        displayName: 'Install, test & lint'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js 18'
            inputs:
              versionSpec: '18.x'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm test
            displayName: 'Run tests'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish source artifact'
            inputs:
              PathtoPublish: '$(Build.SourcesDirectory)'
              ArtifactName: 'app-source'

  # ─────────────────────────────────────────
  # STAGE 2: DOCKER BUILD & PUSH TO ACR
  # ─────────────────────────────────────────
  - stage: Containerize
    displayName: 'Build & Push Docker Image'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DockerJob
        displayName: 'Build Docker image and push to ACR'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            displayName: 'Login to Azure Container Registry'
            inputs:
              azureSubscription: '$(SERVICE_CONNECTION)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - task: Docker@2
            displayName: 'Build Docker image'
            inputs:
              command: 'build'
              dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
              repository: '$(ACR_LOGIN_SERVER)/$(IMAGE_NAME)'
              tags: |
                $(Build.SourceVersion)
                latest

          - task: Docker@2
            displayName: 'Push image to ACR'
            inputs:
              command: 'push'
              repository: '$(ACR_LOGIN_SERVER)/$(IMAGE_NAME)'
              tags: |
                $(Build.SourceVersion)
                latest

  # ─────────────────────────────────────────
  # STAGE 3: DEPLOY TO AZURE CONTAINER APPS
  # ─────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: Containerize
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy container app'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Deploy to Azure Container Apps'
                  inputs:
                    azureSubscription: '$(SERVICE_CONNECTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az containerapp update \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(Build.SourceVersion) \
                        --set-env-vars VERSION=$(Build.SourceVersion)

                - task: AzureCLI@2
                  displayName: 'Print live URL'
                  inputs:
                    azureSubscription: '$(SERVICE_CONNECTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      URL=$(az containerapp show \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --query properties.configuration.ingress.fqdn -o tsv)
                      echo "✅ App deployed at: https://$URL"
